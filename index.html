<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSignal Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:white}

.header{padding:20px 30px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center;background:#020617}
.header h1{margin:0;font-size:20px}

.container{padding:30px;max-width:1200px;margin:auto}

.card{background:#020617;padding:25px;border-radius:14px;border:1px solid #1e293b;margin-bottom:25px}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}

input{padding:10px 12px;border-radius:8px;border:none;background:#1e293b;color:white}

button{padding:10px 18px;border:none;border-radius:8px;background:#2563eb;color:white;font-weight:600;cursor:pointer}
button.copy{background:#16a34a}
button.small{padding:6px 12px;font-size:12px}

.signal-block{background:#020617;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:20px;position:relative}

.copy-btn{position:absolute;top:15px;right:15px}

pre{white-space:pre-wrap;font-size:14px;line-height:1.6;margin:0}

.footer{text-align:center;font-size:12px;color:#94a3b8;padding:15px}
</style>
</head>
<body>

<div class="header">
<h1>📊 AutoSignal Generator</h1>
<div>AutoTrading Tool</div>
</div>

<div class="container">

<div class="card">
<h3>Generator Settings</h3>

<div class="controls">
<input type="date" id="dateInput">
<button onclick="generate()">Generate Signal</button>
</div>

</div>

<div id="output"></div>

</div>

<div class="footer">• AutoSignal Engine •</div>

<script>

const markets=[
"ASIA COMPOSITE INDEX",
"CRYPTO COMPOSITE INDEX",
"EUROPE COMPOSITE INDEX",
"NUSANTARA HALAL INDEX"
];

const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

function formatDate(dateStr){
const d=new Date(dateStr);
return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function realisticSignal(prev1,prev2,stats){
if(prev1===null) return Math.random()>0.5?"B":"S";
let bias=0.5
if(stats.buy-stats.sell>=2) bias=0.35
if(stats.sell-stats.buy>=2) bias=0.65
if(prev1&&prev2&&prev1===prev2){return prev1==="B"?"S":"B"}
return Math.random()<bias?"B":"S"
}

function disclaimer(){
return `Disclaimer:\n⚠️ Signal Hanya Alat Bantu Untuk Kita Analisa\n\n⚠️ Ambil Signal Secukupnya\n\n⚠️ Jika Sudah Mencapai Target Harian "STOP"\n\n⛔️ Apabila Sebelum Signal terjadi Doji, jangan open posisi\n\n⛔️ Jika Trend kuat kita FTT (Follow The Trend) ex. indikasi 3 candle/lebih sebelum signal warna sama.\n\n⛔️ Apabila signal menunjukkan Buy dan trend kuat turun kita Open Sell dan Sebaliknya. Intinya trend jangan di lawan ya\n\nBelum Tau Cara Open Signal ?\n\nKlik Disini (https://t.me/gustavotraderrr/60)`
}

function generate(){

const rawDate=document.getElementById("dateInput").value
if(!rawDate){alert("Pilih tanggal terlebih dahulu");return}

const date=formatDate(rawDate)

const container=document.getElementById("output")
container.innerHTML=""

let hour=0

for(let block=0;block<12;block++){

let text=`🏆 SIGNAL ${date} 🏆\n\n`
text+=`🕐 ZONA WAKTU WIB (GMT+7)\n`
text+=`🕐 DURASI 1 MENIT\n`
text+=`⚠️ MAX K2\n\n`

for(let mkt=0;mkt<2;mkt++){

const market=markets[(block*2+mkt)%4]
const start=hour.toString().padStart(2,'0')

text+=`${market} (${start}:00 – ${start}:55)\n\n`

let prev1=null
let prev2=null
let stats={buy:0,sell:0}

for(let m=0;m<60;m+=5){

let signal=realisticSignal(prev1,prev2,stats)
let time=`${hour.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`

text+=`${time} ${signal}\n`

if(signal==="B") stats.buy++
else stats.sell++

prev2=prev1
prev1=signal

}

text+=`\n`

hour++

}

text+=disclaimer()

let blockDiv=document.createElement("div")
blockDiv.className="signal-block"

let btn=document.createElement("button")
btn.className="copy small copy-btn"
btn.innerText="Copy"
btn.onclick=()=>{
navigator.clipboard.writeText(text)

const original=btn.innerText
btn.innerText="Copied ✓"

setTimeout(()=>{
btn.innerText=original
},1500)
}

let pre=document.createElement("pre")
pre.textContent=text

blockDiv.appendChild(btn)
blockDiv.appendChild(pre)

container.appendChild(blockDiv)

}

}

</script>

</body>
</html>
